services:
  cortex:
    build: .
    restart: unless-stopped
    ports:
      - "7420:7420"
    volumes:
      - cortex-data:/data
    environment:
      RUST_LOG: info
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7420/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  cortex-data:
